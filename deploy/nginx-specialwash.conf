# ══════════════════════════════════════════════════════════════
# Nginx configuration for SpecialWash
# Copy to: /etc/nginx/sites-available/specialwash
# Then: ln -s /etc/nginx/sites-available/specialwash /etc/nginx/sites-enabled/specialwash
# ══════════════════════════════════════════════════════════════

# Backend Gunicorn upstream
upstream specialwash_backend {
    server 127.0.0.1:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name specialwash.studio www.specialwash.studio;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name specialwash.studio www.specialwash.studio;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/specialwash.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/specialwash.studio/privkey.pem;

    # SSL optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissões-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/www/specialwash/logs/nginx-access.log combined;
    error_log /var/www/specialwash/logs/nginx-error.log warn;

    # Frontend React SPA
    root /var/www/specialwash-frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript;

    # ──────────────────────────────────────────────────────────────
    # API Proxy to Gunicorn backend
    # ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://specialwash_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering (for large file uploads)
        proxy_buffering off;
        proxy_request_buffering off;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ──────────────────────────────────────────────────────────────
    # React SPA - Try files fallback
    # ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────────────────────
    # Static assets - Cache aggressively
    # ──────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* index\.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ──────────────────────────────────────────────────────────────
    # Deny access to sensitive files
    # ──────────────────────────────────────────────────────────────
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.ht {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ──────────────────────────────────────────────────────────────
    # Favicon and robots (no log 404s)
    # ──────────────────────────────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ──────────────────────────────────────────────────────────────
    # Deny access to other sensitive locations
    # ──────────────────────────────────────────────────────────────
    location ~* \.(py|cfg|conf|sql|bak|backup)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
