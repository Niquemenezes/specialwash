server {
    listen 80;
    listen [::]:80;
    server_name specialwash.studio www.specialwash.studio;
    root /var/www/specialwash/public_html;
    index index.html;

    # Cabeceras anti-cache
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";

    # Servir archivos estáticos directamente (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        expires -1;
    }

    # API proxy (preserva /api/* para que Flask reciba rutas correctas)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Soporte para subida de videos grandes
        client_max_body_size 300M;
        client_body_timeout  600s;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
    }

    # Rutas de React SPA - solo para rutas que NO son archivos
    location / {
        try_files $uri $uri/ /index.html;
    }
}
