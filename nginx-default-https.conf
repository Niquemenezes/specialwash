# Configuración Nginx con HTTPS para SpecialWash
# Redirige HTTP a HTTPS y configura SSL

# Redirigir todo el tráfico HTTP (puerto 80) a HTTPS (puerto 443)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Redirigir a HTTPS
    return 301 https://$host$request_uri;
}

# Servidor HTTPS (puerto 443)
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    # Certificados SSL
    ssl_certificate /etc/nginx/ssl/specialwash.crt;
    ssl_certificate_key /etc/nginx/ssl/specialwash.key;

    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Raíz del sitio
    root /var/www/specialwash/public_html;
    index index.html;

    # Aumentar tamaño máximo de subida para videos (100MB)
    client_max_body_size 100M;

    # Timeouts para subidas grandes
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # Cabeceras anti-cache
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Servir archivos estáticos directamente (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        expires -1;
    }

    # API proxy (preserva /api/* para que Flask reciba rutas correctas)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts para la API
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Rutas de React SPA - solo para rutas que NO son archivos
    location / {
        try_files $uri $uri/ /index.html;
    }
}
