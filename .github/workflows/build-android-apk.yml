name: Build Android APK

on:
  workflow_dispatch:

env:
  # Adelanta la migracion de GitHub Actions a Node 24 para evitar warnings/fallos futuros.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build web and sync Capacitor Android
        working-directory: frontend
        env:
          CI: "false"
        run: npm run build:android

      - name: Configure Android local.properties for CI
        working-directory: frontend/android
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_PATH" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME no definido en runner" >&2
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > local.properties
          echo "Usando SDK en: $SDK_PATH"

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: specialwash-apk-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
